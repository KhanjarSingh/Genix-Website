      <circle cx="320" cy="320" r="300" />
    </clipPath>
  </defs>
  <g clip-path="url(#clip-circle)">
    <rect width="640" height="640" fill="#000000" />
    <g transform="translate(320 330) scale(1.24) translate(-320 -330)">
      <text x="320" y="360" text-anchor="middle" font-family="DM Sans, Arial, Helvetica, sans-serif" font-size="150" font-weight="500" letter-spacing="-2" fill="#ffffff">genyx</text>
    </g>
  </g>
